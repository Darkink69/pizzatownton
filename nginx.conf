server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # кэш статики
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|map)$ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location = /tonconnect-manifest.json { try_files $uri =404; }
  location = /favicon.ico { try_files $uri =404; access_log off; log_not_found off; }
  location = /robots.txt { try_files $uri =404; access_log off; log_not_found off; }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}